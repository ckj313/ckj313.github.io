<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ckj313 信息中心</title>
  <style>
    :root {
      --bg: #f5f8ff;
      --card: #ffffff;
      --text: #1e2a3b;
      --muted: #5f6f86;
      --accent: #2563eb;
      --accent-soft: #e8efff;
      --border: #dbe6ff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(180deg, #eef4ff 0%, var(--bg) 45%);
      color: var(--text);
      line-height: 1.65;
    }
    .wrap { max-width: 980px; margin: 0 auto; padding: 24px 18px 42px; }
    .hero {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 28px 22px;
      text-align: center;
      box-shadow: 0 8px 22px rgba(37, 99, 235, 0.08);
      margin-bottom: 18px;
    }
    .hero h1 { margin: 0 0 8px; font-size: clamp(28px, 3.8vw, 40px); }
    .hero p { margin: 0; color: var(--muted); }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 14px; }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 18px;
      box-shadow: 0 8px 20px rgba(15, 23, 42, 0.05);
    }
    .card h2 { margin: 0 0 8px; font-size: 20px; }
    .card p { margin: 0 0 12px; color: var(--muted); font-size: 14px; min-height: 70px; }
    .actions { display: flex; flex-wrap: wrap; gap: 8px; }
    .btn {
      display: inline-block;
      text-decoration: none;
      background: var(--accent-soft);
      color: var(--accent);
      border: 1px solid #cddcff;
      padding: 6px 11px;
      border-radius: 999px;
      font-size: 13px;
      transition: .15s ease;
    }
    .btn:hover { transform: translateY(-1px); background: #dce8ff; }
    .footer { margin-top: 26px; text-align: center; color: var(--muted); font-size: 12px; }
    .footer a { color: var(--accent); }
  </style>
</head>
<body>
  <main class="wrap">
    <header class="hero">
      <h1>📊 ckj313 信息中心</h1>
      <p>每日自动更新 · 数据驱动决策</p>
    </header>

    <section class="grid">
      <article class="card">
        <h2>💰 Web3 技术分析</h2>
        <p>BTC / ETH / SOL / BNB 技术分析，包含指标、支撑阻力、波动率与交易观点。</p>
        <div class="actions">
          <a class="btn" href="web3-analysis/">最新报告</a>
          <a class="btn" href="web3-analysis/2026-04-27/BTC.html">BTC</a>
          <a class="btn" href="web3-analysis/2026-04-27/ETH.html">ETH</a>
          <a class="btn" href="web3-analysis/2026-04-27/SOL.html">SOL</a>
          <a class="btn" href="web3-analysis/2026-04-27/BNB.html">BNB</a>
        </div>
      </article>

      <article class="card">
        <h2>📡 TrendRadar 热点新闻</h2>
        <p>全球主流媒体 + Web3/Crypto 消息源聚合，AI 筛选总结。</p>
        <div class="actions">
          <a class="btn" href="reports/">查看日报</a>
          <a class="btn" href="reports/2026-04-27/latest.html">最新一期</a>
        </div>
      </article>

      <article class="card">
        <h2>📰 AI RSS 订阅</h2>
        <p>RSS 自动抓取、分析和推送。当前提供入口页面，归档后续上线。</p>
        <div class="actions">
          <a class="btn" href="rss/">进入 RSS</a>
        </div>
      </article>
    </section>

    <footer class="footer">
      <p>⚠️ 以上信息仅供学习参考，不构成投资建议</p>
      <p>GitHub: <a href="https://github.com/ckj313">ckj313</a></p>
    </footer>
  </main>
</body>
</html>
