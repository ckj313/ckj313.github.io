<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web3 技术分析 - 2026-05-01</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
            background: #0f1419;
            color: #e1e8ed;
        }
        h1 { text-align: center; color: #1a73e8; margin-bottom: 24px; }
        .coin-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        .coin-card {
            background: #1e2a3a;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            border: 1px solid #2d3748;
        }
        .coin-card a {
            color: #1a73e8;
            text-decoration: none;
            font-size: 20px;
            font-weight: 700;
        }
        .coin-card a:hover { text-decoration: underline; }
        .coin-card .date { color: #8899a6; font-size: 14px; margin-top: 8px; }
    </style>
</head>
<body>
    <h1>📊 Web3 技术分析 - 2026-05-01</h1>
    <div class="coin-grid">
        
    </div>
</body>
</html>
